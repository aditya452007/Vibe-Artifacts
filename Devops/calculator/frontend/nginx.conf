server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    # Note: In production (Cloud Run), frontend and backend might be separate services.
    # This nginx config allows the frontend container to proxy requests if they are co-located 
    # or if we set up a reverse proxy. However, in our architecture, the frontend calls the API URL directly.
    # But for serving static files and handling client-side routing, this is essential.
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
